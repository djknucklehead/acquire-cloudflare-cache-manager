name: Package release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to package, for example v3.0.3
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Build and attach plugin zip
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag }}

      - name: Validate release version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          PLUGIN_VERSION="$(sed -nE 's/^[[:space:]]+\*[[:space:]]Version:[[:space:]]+([^[:space:]]+).*/\1/p' acquire-cloudflare-cache-manager.php | head -n 1)"
          CONST_VERSION="$(sed -nE "s/^[[:space:]]*const VERSION[[:space:]]*=[[:space:]]*'([^']+)'.*/\1/p" acquire-cloudflare-cache-manager.php | head -n 1)"

          if [ -z "$PLUGIN_VERSION" ]; then
            echo "Could not read plugin header Version."
            exit 1
          fi

          if [ "$PLUGIN_VERSION" != "$CONST_VERSION" ]; then
            echo "Plugin header Version ($PLUGIN_VERSION) does not match const VERSION ($CONST_VERSION)."
            exit 1
          fi

          if [ "$RELEASE_TAG" != "v$PLUGIN_VERSION" ]; then
            echo "Release tag ($RELEASE_TAG) must match plugin version v$PLUGIN_VERSION."
            exit 1
          fi

          echo "plugin_version=$PLUGIN_VERSION" >> "$GITHUB_OUTPUT"
          echo "package_name=acquire-cloudflare-cache-manager-v$PLUGIN_VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: |
          PACKAGE_NAME="${{ steps.version.outputs.package_name }}"
          STAGING_DIR="$(mktemp -d)"

          mkdir -p "$STAGING_DIR/acquire-cloudflare-cache-manager"
          rsync -a \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='AGENTS.md' \
            --exclude='.DS_Store' \
            --exclude='*.zip' \
            ./ "$STAGING_DIR/acquire-cloudflare-cache-manager/"

          cd "$STAGING_DIR"
          zip -r "$GITHUB_WORKSPACE/$PACKAGE_NAME" acquire-cloudflare-cache-manager

      - name: Attach zip to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" "${{ steps.version.outputs.package_name }}" --clobber
